# =====================================================================
# GATEWAY SERVER : Application Configuration
# Port: 8080 | Eureka Name: API-GATEWAY
# =====================================================================
server.port=8080
spring.application.name=API-GATEWAY

# ---------------------------------------------------------------------
# EUREKA CLIENT
# ---------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---------------------------------------------------------------------
# GATEWAY ROUTING CONFIGURATION
# ---------------------------------------------------------------------
# Disable automatic discovery routing to use explicit definitions below
spring.cloud.gateway.discovery.locator.enabled=false

# ROUTE 0: Auth Service (Public)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVER
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# ROUTE 1: Field Service (Protected)
spring.cloud.gateway.routes[1].id=field-service
spring.cloud.gateway.routes[1].uri=lb://FIELD-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/fields/**
spring.cloud.gateway.routes[1].filters[0]=AuthFilter

# ROUTE 2: Booking Service (Protected)
spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].uri=lb://BOOKING-SERVER
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/bookings/**
spring.cloud.gateway.routes[2].filters[0]=AuthFilter

# ROUTE 3: Weather Service (Protected)
spring.cloud.gateway.routes[3].id=weather-service
spring.cloud.gateway.routes[3].uri=lb://WEATHER-SERVER
spring.cloud.gateway.routes[3].predicates[0]=Path=/weather/**
spring.cloud.gateway.routes[3].filters[0]=AuthFilter

# -----------------------------------------------------------------------
# SWAGGER / OpenAPI routes (no AuthFilter — public access for docs)
# -----------------------------------------------------------------------
# Auth Server swagger
spring.cloud.gateway.routes[4].id=auth-service-swagger
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVER
spring.cloud.gateway.routes[4].predicates[0]=Path=/swagger/auth-server/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/swagger/auth-server/v3/api-docs, /v3/api-docs

# Field Service swagger
spring.cloud.gateway.routes[5].id=field-service-swagger
spring.cloud.gateway.routes[5].uri=lb://FIELD-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/swagger/field-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/swagger/field-service/v3/api-docs, /v3/api-docs

# Booking Service swagger
spring.cloud.gateway.routes[6].id=booking-service-swagger
spring.cloud.gateway.routes[6].uri=lb://BOOKING-SERVER
spring.cloud.gateway.routes[6].predicates[0]=Path=/swagger/booking-server/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/swagger/booking-server/v3/api-docs, /v3/api-docs

# Weather Service swagger
spring.cloud.gateway.routes[7].id=weather-service-swagger
spring.cloud.gateway.routes[7].uri=lb://WEATHER-SERVER
spring.cloud.gateway.routes[7].predicates[0]=Path=/swagger/weather-server/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/swagger/weather-server/v3/api-docs, /v3/api-docs

# ---------------------------------------------------------------------
# SWAGGER AGGREGATION (centralized docs for all services)
# UI: http://localhost:8080/swagger-ui.html
# ---------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=false


management.endpoints.web.exposure.include=health,info,gateway

# ---------------------------------------------------------------------
# LOGGING & DIAGNOSTICS
# ---------------------------------------------------------------------
logging.level.com.sports.gateway_server=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n

# ---------------------------------------------------------------------
# GLOBAL CORS CONFIGURATION
# ---------------------------------------------------------------------
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true