# =====================================================================
# AUTH SERVER Application Configuration
# Port: 8084 | Eureka Name: AUTH-SERVER | Database: auth_db
# Swagger UI: http://localhost:8084/swagger-ui.html
# =====================================================================

server.port=8084
spring.application.name=AUTH-SERVER

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT secret key (Base64-encoded 256-bit key for HS256)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Swagger / SpringDoc
# FIX: Use /swagger-ui.html (not /swagger-ui/index.html) to prevent double-path redirect
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# Timezone
spring.jackson.time-zone=Asia/Kolkata

# Logging
logging.level.com.sports.auth_server=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n
