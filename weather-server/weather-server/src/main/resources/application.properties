# =====================================================================
# WEATHER SERVER : Application Configuration
# Port: 8083 | Eureka Name: WEATHER-SERVER | Database: None
# Swagger UI: http://localhost:8083/swagger-ui.html
# =====================================================================
server.port=8083
spring.application.name=WEATHER-SERVER

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger / SpringDoc
# FIX: Changed from /swagger-ui/index.html to /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.try-it-out-enabled=true

# Logging
logging.level.com.sports.weather_server=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration