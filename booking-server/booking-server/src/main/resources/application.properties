# =====================================================================
# BOOKING SERVER : Application Configuration
# Port: 8082 | Eureka Name: BOOKING-SERVER | Database: booking_db
# Swagger UI: http://localhost:8082/swagger-ui.html
# =====================================================================
server.port=8082
spring.application.name=BOOKING-SERVER

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# OpenFeign timeouts
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# Swagger / SpringDoc
# FIX: Changed from /swagger-ui/index.html to /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.try-it-out-enabled=true

# Timezone — ensures @FutureOrPresent validation works correctly in IST
spring.jackson.time-zone=Asia/Kolkata

# Logging
logging.level.com.sports.booking_server=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
