# =====================================================================
# FIELD SERVER : Application Configuration
# Port: 8081 | Eureka Name: FIELD-SERVICE | Database: field_db
# Swagger UI: http://localhost:8081/swagger-ui.html
# =====================================================================
server.port=8081
spring.application.name=FIELD-SERVICE

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/field_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger / SpringDoc

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Timezone
spring.jackson.time-zone=Asia/Kolkata

# Logging
logging.level.com.sports.field_server=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] - %msg%n

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
